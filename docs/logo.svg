<svg viewBox="20 8 60 116" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="plumb-line logo">
  <defs>
    <!-- Plumb bob (the derived value): warm amber, faceted below -->
    <radialGradient id="gem" cx="36%" cy="24%" r="80%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="45%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="0.6"/></filter>
    <!-- Soft glow marking where mock/low-confidence data enters the lineage -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.2"/></filter>
    <!-- Drop shadow under the bob -->
    <filter id="ds" x="-70%" y="-30%" width="240%" height="210%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="b"/>
      <feOffset in="b" dx="0.8" dy="2.2" result="o"/>
      <feFlood flood-color="#3a1503" flood-opacity="0.32" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Anchor: the fixed source of truth the line hangs from -->
  <rect x="41" y="11" width="18" height="5" rx="2.5" fill="#94a3b8"/>
  <!-- The plumb line / lineage string -->
  <line x1="50" y1="14" x2="50" y2="76" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Contamination point: where mock/low-confidence data enters -->
  <circle cx="50" cy="52" r="9" fill="#fbbf24" opacity="0.5" filter="url(#glow)"/>

  <!-- Provenance chain. Clean (green) up top; once taint enters it
       propagates downward (amber) and can't be laundered back to clean. -->
  <circle cx="50" cy="26" r="5.6" fill="#2da44e" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="48" cy="24" rx="2" ry="1.3" fill="#fff" opacity="0.55" filter="url(#soft)"/>
  <circle cx="50" cy="39" r="5.6" fill="#2da44e" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="48" cy="37" rx="2" ry="1.3" fill="#fff" opacity="0.55" filter="url(#soft)"/>
  <circle cx="50" cy="52" r="5.6" fill="#f59e0b" stroke="#b45309" stroke-width="0.6"/>
  <ellipse cx="48" cy="50" rx="2" ry="1.3" fill="#fff" opacity="0.55" filter="url(#soft)"/>
  <circle cx="50" cy="65" r="5.6" fill="#f59e0b" stroke="#b45309" stroke-width="0.6"/>
  <ellipse cx="48" cy="63" rx="2" ry="1.3" fill="#fff" opacity="0.55" filter="url(#soft)"/>

  <!-- Plumb bob: faceted weight, lit top-left, that inherits the taint -->
  <g filter="url(#ds)">
    <polygon points="50,74 35,95 50,95" fill="#fcd34d"/>
    <polygon points="50,74 50,95 65,95" fill="#f59e0b"/>
    <polygon points="35,95 50,116 50,95" fill="#b45309"/>
    <polygon points="50,95 50,116 65,95" fill="#7c2d12"/>
  </g>
  <polygon points="50,74 54,92 50,95" fill="#fff" opacity="0.18"/>
  <polygon points="50,74 46,92 50,95" fill="#fff" opacity="0.32"/>
  <polygon points="49,77 44,91 48.5,93" fill="#fff" opacity="0.3" filter="url(#soft)"/>
</svg>
